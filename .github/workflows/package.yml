name: Package all images and deploy to pre-prod
run-name: ${{ github.workflow }} (`${{ inputs.VERSION }}`@${{ inputs.ENVIRONMENT }})

on:
  # Called from release orchestrator
  workflow_dispatch:
    inputs:
      VERSION:
        description: 'The version to build (e.g. `5.4.1`)'
        required: true
      RELEASE_TYPE:
        description: 'What should be built'
        required: true
        type: choice
        options:
          - ALL
          - OSS
          - EE
      ENVIRONMENT:
        description: 'Environment to use'
        required: true
        type: environment
      distinct_id:
        description: 'Required exclusively for automated execution to track status of workflow execution'
        required: false
  workflow_call:
    inputs:
      VERSION:
        description: 'The version to build (e.g. `5.4.1`)'
        required: true
        type: string
      RELEASE_TYPE:
        description: 'What should be built'
        required: true
        type: string
      ENVIRONMENT:
        description: 'Environment to use'
        required: true
        type: string

jobs:
  update-version:
    runs-on: ubuntu-slim
    permissions:
      contents: write
    env:
      VERSION: ${{ inputs.VERSION }}
    steps:
        # https://github.com/Codex-/return-dispatch#receiving-repository-action
      - name: Logging distinct ID (${{ inputs.distinct_id }})
        run: echo "${DISTINCT_ID}"
        env:
          DISTINCT_ID: ${{ inputs.distinct_id }}

      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.VERSION }}

      - name: Update `SNAPSHOT` to release version
        run: |
          find . -type f -iname 'Dockerfile' \
            -exec sed -i -E "s/^ARG HZ_VERSION=.*/ARG HZ_VERSION=${VERSION}/" {} +

      - name: Commit
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

          git commit --all --message "Upgrade version to \`${VERSION}\`"
          git push

  package:
    needs: update-version
    uses: ./.github/workflows/tag_image_package.yml
    with:
      SOURCE_REF: ${{ inputs.VERSION }}
      RELEASE_TYPE: ${{ inputs.RELEASE_TYPE }}
      ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
    secrets: inherit

  package-nlc:
    if: inputs.RELEASE_TYPE != 'OSS'
    needs: update-version
    uses: ./.github/workflows/ee-nlc-tag-package.yml
    with:
      SOURCE_REF: ${{ inputs.VERSION }}
      ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
    secrets: inherit
