name: Promote image to Docker registry

on:
  # For debugging only
  workflow_dispatch:
    inputs:
      HZ_VERSION:
        description: 'Version of Hazelcast to build the image for, e.g. 5.1.1, 5.0.1'
        required: true
      JDKS:
        description: 'Supported JDKs - e.g. `[17, 21]`'
        required: true
      IS_LATEST_LTS:
        description: 'Is Latest LTS? e.g. `false`'
        required: true
      DEFAULT_JDK:
        description: 'The Java major version (e.g. `21`, `8`) used by default in the image'
        required: true
      DISTRIBUTION_CLASSIFIERS:
        required: true
      DISTRIBUTION_TYPES:
        required: true
      ENVIRONMENT:
        description: 'Environment to use'
        required: true
        type: environment
  workflow_call:
    inputs:
      HZ_VERSION:
        description: 'Version of Hazelcast to build the image for, e.g. 5.1.1, 5.0.1'
        required: true
        type: string
      JDKS:
        description: 'Supported JDKs - e.g. `[17, 21]`'
        required: true
        type: string
      IS_LATEST_LTS:
        description: 'Is Latest LTS? e.g. `false`'
        required: true
        type: string
      DEFAULT_JDK:
        description: 'The Java major version (e.g. `21`, `8`) used by default in the image'
        required: true
        type: string
      DISTRIBUTION_CLASSIFIERS:
        required: true
        type: string
      DISTRIBUTION_TYPES:
        required: true
        type: string
      ENVIRONMENT:
        description: 'Environment to use'
        required: true
        type: string

jobs:
  promote-docker-registry:
    environment: ${{ inputs.ENVIRONMENT }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    strategy:
      matrix:
        jdk: ${{ fromJSON(inputs.JDKS) }}
        classifier: ${{ fromJSON(inputs.DISTRIBUTION_CLASSIFIERS) }}
        distribution-type: ${{ fromJSON(inputs.DISTRIBUTION_TYPES) }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: get-tags-to-push
        uses: ./.github/actions/get-tags-to-push
        with:
          hz-version: ${{ inputs.HZ_VERSION }}
          jdk: ${{ matrix.jdk }}
          default-jdk: ${{ inputs.DEFAULT_JDK }}
          classifier: ${{ matrix.classifier }}
          # LTS is implicitly EE only
          is-latest-lts: ${{ matrix.distribution-type.label == 'ee' && inputs.IS_LATEST_LTS == 'true' }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_DEV_INFRA_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_DEV_INFRA_SECRET_ACCESS_KEY }}
          aws-region: 'us-east-1'

      - name: Get Secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            JFROG,JFROG/WRITE_DEV_ACCOUNT
          parse-json-secrets: true

      - id: authenticate-jfrog-write-dev-account
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: https://${{ env.JFROG_URL }}
        with:
          oidc-provider-name: ${{ github.repository_owner }}-write-dev-account

      - name: Login to JFrog
        uses: docker/login-action@v3
        with:
          registry: ${{ env.JFROG_URL }}
          username: ${{ steps.authenticate-jfrog-write-dev-account.outputs.oidc-user }}
          password: ${{ steps.authenticate-jfrog-write-dev-account.outputs.oidc-token }}

      - name: Push image to remote registry
        run: |
          if [[ "${{ matrix.distribution-type.label }}" == "oss" && "${HZ_VERSION}" =~ SNAPSHOT ]]; then
            remote_registry=${JFROG_URL}/docker/hazelcast
          else
            remote_registry=${{ vars.DOCKERHUB_NAMESPACE }}
          fi

          for tag in ${TAGS_TO_PUSH[@]}
          do
            skopeo copy \
              --all \
              docker://${JFROG_URL}/${{ vars.PREPROD_REGISTRY }}/${{ matrix.distribution-type.image-name }}:${{ steps.get-tags-to-push.outputs.primary-tag }} \
              docker://${remote_registry}/${{ matrix.distribution-type.image-name }}:${tag}
          done
        env:
          HZ_VERSION: ${{ inputs.HZ_VERSION }}
          TAGS_TO_PUSH: ${{ steps.get-tags-to-push.outputs.all-destination-tags }}
