name: Promote image from pre-prod to prod
run-name: ${{ github.workflow }} (`${{ inputs.VERSION }}`@${{ inputs.ENVIRONMENT }})

on:
  # Called from release orchestrator
  workflow_dispatch:
    inputs:
      VERSION:
        description: 'The version to promote (e.g. `5.4.1`)'
        required: true
      RELEASE_TYPE:
        description: 'What should be promoted'
        required: true
        type: choice
        options:
          - ALL
          - OSS
          - EE
      ENVIRONMENT:
        description: 'Environment to use'
        required: true
        type: environment
      distinct_id:
        description: 'Required exclusively for automated execution to track status of workflow execution'
        required: false
  workflow_call:
    inputs:
      VERSION:
        description: 'The version to promote (e.g. `5.4.1`)'
        required: true
        type: string
      RELEASE_TYPE:
        description: 'What should be promoted'
        required: true
        type: string
      ENVIRONMENT:
        description: 'Environment to use'
        required: true
        type: string

jobs:
  tag:
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
        # https://github.com/Codex-/return-dispatch#receiving-repository-action
      - name: Logging distinct ID (${{ inputs.distinct_id }})
        run: echo "${DISTINCT_ID}"
        env:
          DISTINCT_ID: ${{ inputs.distinct_id }}

      - uses: hazelcast/docker-actions/create-tag@master
        with:
          TOKEN: ${{ github.token }}
          BRANCH: ${{ inputs.VERSION }}

  promote:
    uses: ./.github/workflows/tag_image_promote.yml
    with:
      SOURCE_REF: ${{ inputs.VERSION }}
      RELEASE_TYPE: ${{ inputs.RELEASE_TYPE }}
      ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
    secrets: inherit

  promote-nlc:
    if: inputs.RELEASE_TYPE != 'OSS'
    uses: ./.github/workflows/ee-nlc-tag-promote.yml
    with:
      SOURCE_REF: ${{ inputs.VERSION }}
      ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
    secrets: inherit

  readme:
    needs: promote
    uses: ./.github/workflows/update_readme.yml
    with:
      ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
    secrets: inherit
